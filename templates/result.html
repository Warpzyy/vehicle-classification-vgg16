<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Prediksi - Klasifikasi Kendaraan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .main-card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: none;
            margin-top: 60px;
        }
        .result-image {
            border-radius: 15px;
            max-height: 300px;
            width: 100%;
            object-fit: cover;
        }
        .result-badge {
            font-size: 1.3rem;
            padding: 10px 25px;
            border-radius: 30px;
        }
        .prob-bar-label {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-back {
            background: #2a5298;
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-back:hover {
            background: #1e3c72;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card main-card">
                    <div class="card-body p-5">
                        <h4 class="text-center mb-4"><i class="fa-solid fa-chart-simple me-2"></i>Hasil Prediksi</h4>

                        <img src="{{ image_url }}" class="result-image mb-4" alt="Gambar diunggah">

                        <div class="text-center mb-4">
                            <span class="badge bg-success result-badge">
                                {{ predicted_class|upper }}
                            </span>
                            <p class="text-muted mt-2 mb-0">Tingkat keyakinan: <strong>{{ confidence }}%</strong></p>
                        </div>

                        <hr>
                        <p class="fw-semibold mb-2">Probabilitas Semua Kelas:</p>
                        {% for cls, prob in all_probs.items() %}
                        <div class="mb-2">
                            <div class="d-flex justify-content-between prob-bar-label">
                                <span>{{ cls|capitalize }}</span>
                                <span>{{ prob }}%</span>
                            </div>
                            <div class="progress" style="height: 8px;">
                                <div class="progress-bar bg-primary" style="width: {{ prob }}%;"></div>
                            </div>
                        </div>
                        {% endfor %}

                        <div class="d-grid mt-4">
                            <a href="/" class="btn btn-back text-white">
                                <i class="fa-solid fa-rotate-left me-2"></i>Prediksi Gambar Lain
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
